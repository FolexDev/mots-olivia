<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu des syllabes 🌟</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf8ff; min-height: 100vh; padding-bottom: 2rem; }
  .game { padding: 1.2rem; max-width: 640px; margin: 0 auto; }
  h1 { text-align: center; font-size: 22px; font-weight: 600; color: #3C3489; margin: 0.8rem 0 1.2rem; }
  .section-label { font-size: 12px; color: #888; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.6rem; }
  .tag { padding: 6px 13px; border-radius: 50px; border: 1.5px solid #ccc; background: #fff; color: #555; font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .tag.theme-active { background: #9FE1CB; border-color: #1D9E75; color: #04342C; }
  .tag.sound-active { background: #FAC775; border-color: #BA7517; color: #412402; }
  .separator { width: 100%; height: 1px; background: #e8e4f0; margin: 0.7rem 0; }
  .add-theme-row { display: flex; gap: 8px; align-items: center; margin-bottom: 0.3rem; }
  .add-theme-row input { flex: 1; padding: 9px 14px; border-radius: 50px; border: 1.5px solid #ccc; background: #fff; color: #333; font-size: 14px; outline: none; font-family: inherit; }
  .add-theme-row input:focus { border-color: #7F77DD; }
  .theme-info { font-size: 12px; color: #aaa; margin-bottom: 0.7rem; line-height: 1.5; }
  .word-card { background: #fff; border-radius: 20px; box-shadow: 0 2px 16px rgba(127,119,221,0.10); padding: 1.2rem 1rem 1rem; margin-bottom: 0.8rem; }
  .counter-display { text-align: center; font-size: 13px; color: #aaa; margin-bottom: 0.4rem; }
  .progress-bar-wrap { background: #ede9fa; border-radius: 20px; height: 7px; overflow: hidden; margin-bottom: 1rem; }
  .progress-bar { height: 7px; border-radius: 20px; background: #7F77DD; transition: width 0.4s; }
  .word-display { text-align: center; font-size: 42px; font-weight: 700; color: #2C2C2A; margin: 0.5rem 0; min-height: 56px; letter-spacing: 2px; line-height: 1.2; }
  .word-display .hs { color: #BA7517; }
  .speak-btn { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 0.6rem auto; padding: 11px 26px; font-size: 16px; border-radius: 50px; background: #FAC775; color: #412402; border: none; cursor: pointer; font-weight: 600; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
  .speak-btn:active { transform: scale(0.95); }
  .tokens-zone { display: flex; justify-content: center; gap: 12px; min-height: 78px; flex-wrap: wrap; align-items: center; margin: 0.7rem 0; padding: 0.8rem; border-radius: 16px; border: 2px dashed #ccc; background: #faf8ff; }
  .star-token { width: 56px; height: 56px; cursor: pointer; transition: transform 0.1s; user-select: none; display: flex; align-items: center; justify-content: center; position: relative; -webkit-tap-highlight-color: transparent; }
  .star-token:active { transform: scale(0.85); }
  .star-token svg { width: 56px; height: 56px; }
  .star-token .star-num { position: absolute; font-size: 16px; font-weight: 600; color: #26215C; pointer-events: none; }
  .action-row { display: flex; justify-content: center; gap: 10px; margin: 0.7rem 0; flex-wrap: wrap; }
  .add-btn { padding: 12px 22px; font-size: 22px; border-radius: 50px; background: #9FE1CB; color: #04342C; border: none; cursor: pointer; font-weight: 600; -webkit-tap-highlight-color: transparent; }
  .validate-btn { padding: 12px 24px; font-size: 15px; border-radius: 50px; background: #C0DD97; color: #173404; border: none; cursor: pointer; font-weight: 600; -webkit-tap-highlight-color: transparent; }
  .next-btn { padding: 12px 24px; font-size: 15px; border-radius: 50px; background: #B5D4F4; color: #042C53; border: none; cursor: pointer; font-weight: 600; -webkit-tap-highlight-color: transparent; }
  .feedback { text-align: center; font-size: 22px; min-height: 40px; margin: 0.3rem 0; font-weight: 600; }
  .feedback.correct { color: #3B6D11; }
  .feedback.wrong { color: #A32D2D; }
  .hint { text-align: center; font-size: 13px; color: #aaa; margin-top: 0.4rem; letter-spacing: 1px; }
  .empty-msg { text-align: center; color: #aaa; font-size: 15px; padding: 2rem 1rem; }
  .gen-btn { padding: 9px 16px; border-radius: 50px; background: #AFA9EC; border: none; color: #26215C; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .loading-badge { font-size: 12px; color: #aaa; padding: 4px 0; display: none; }
  .error-badge { font-size: 12px; color: #A32D2D; padding: 4px 0; display: none; }
  @media (max-width: 400px) {
    .word-display { font-size: 34px; }
    .star-token { width: 48px; height: 48px; }
    .star-token svg { width: 48px; height: 48px; }
  }
</style>

<body>
<div class="game">
  <h1>🌟 Jeu des syllabes</h1>

  <div class="section-label">Thème</div>
  <div class="filters" id="theme-tags">
    <span class="tag theme-active" data-type="theme" data-val="animaux" onclick="toggleFilter(this)">🐾 Animaux</span>
    <span class="tag" data-type="theme" data-val="nourriture" onclick="toggleFilter(this)">🍎 Nourriture</span>
    <span class="tag" data-type="theme" data-val="nature" onclick="toggleFilter(this)">🌿 Nature</span>

    <span class="tag" data-type="theme" data-val="maison" onclick="toggleFilter(this)">🏠 Maison</span>
    <span class="tag" data-type="theme" data-val="corps" onclick="toggleFilter(this)">🖐️ Corps</span>
    <span class="tag" data-type="theme" data-val="vetements" onclick="toggleFilter(this)">👕 Vêtements</span>
    <span class="tag" data-type="theme" data-val="ecole" onclick="toggleFilter(this)">✏️ École</span>
    <span class="tag" data-type="theme" data-val="jouets" onclick="toggleFilter(this)">🧸 Jouets</span>
    <span class="tag" data-type="theme" data-val="sports" onclick="toggleFilter(this)">⚽ Sports</span>
    <span class="tag" data-type="theme" data-val="princesse" onclick="toggleFilter(this)">👸 Princesse</span>
  </div>

  <div class="separator"></div>

  <div class="section-label">Sons</div>
  <div class="filters" style="margin-bottom:0.8rem">
    <span class="tag" data-type="sound" data-val="S" onclick="toggleFilter(this)">S</span>
    <span class="tag" data-type="sound" data-val="C" onclick="toggleFilter(this)">C</span>
    <span class="tag" data-type="sound" data-val="CH" onclick="toggleFilter(this)">CH</span>
    <span class="tag" data-type="sound" data-val="Z" onclick="toggleFilter(this)">Z</span>
    <span class="tag" data-type="sound" data-val="G" onclick="toggleFilter(this)">G</span>
    <span class="tag" data-type="sound" data-val="J" onclick="toggleFilter(this)">J</span>
  </div>

  <div id="empty-msg" class="empty-msg" style="display:none">Aucun mot trouvé avec ces filtres.</div>

  <div id="game-area" class="word-card">
    <div class="counter-display" id="counter"></div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress" style="width:0%"></div></div>
    <div class="word-display" id="word-display"></div>
    <button class="speak-btn" onclick="speakCurrent()">🔊 Écouter</button>
    <div class="tokens-zone" id="tokens-zone"><span style="color:#bbb;font-size:14px">Place tes étoiles ici !</span></div>
    <div class="action-row">
      <button class="add-btn" onclick="addToken()">+ Étoile</button>
      <button class="validate-btn" onclick="validate()">✔ Valider</button>
      <button class="next-btn" id="next-btn" style="display:none" onclick="nextWord()">Suivant →</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="hint" id="hint">Place une étoile pour chaque syllabe, puis valide !</div>
  </div>
</div>

let activeThemes = new Set(["animaux"]);
let activeSounds = new Set();
let playlist = [], idx = 0, tokens = 0, answered = false;
let girlVoice = null;

function pickGirlVoice() {
  const voices = window.speechSynthesis.getVoices();
  const fr = voices.filter(v => v.lang.startsWith('fr'));
  const female = fr.find(v => /female|fille|femme|woman|amélie|lea|léa|virginie|julie/i.test(v.name));
  return female || fr[0] || voices[0] || null;
}

function speakCurrent() {
  if (!window.speechSynthesis) return;
  const w = current(); if (!w) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(w.word);
  u.lang = 'fr-FR'; u.rate = 0.8; u.pitch = 1.6;
  if (girlVoice) u.voice = girlVoice;
  window.speechSynthesis.speak(u);
}

function speakText(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const plain = text.replace(/[\u{1F300}-\u{1FAFF}]/gu, '').trim();
  const u = new SpeechSynthesisUtterance(plain);
  u.lang = 'fr-FR'; u.rate = 0.9; u.pitch = 1.6;
  if (girlVoice) u.voice = girlVoice;
  window.speechSynthesis.speak(u);
}

function makeStar(num) {
  const div = document.createElement('div');
  div.className = 'star-token';
  div.innerHTML = '<svg viewBox="0 0 58 58" xmlns="http://www.w3.org/2000/svg"><polygon points="29,4 35.5,21 54,21 39.5,32 45,49 29,38 13,49 18.5,32 4,21 22.5,21" fill="#AFA9EC" stroke="#7F77DD" stroke-width="2.5" stroke-linejoin="round" class="star-poly"/></svg><span class="star-num">' + num + '</span>';
  return div;
}

function addToken() {
  if (answered) return;
  tokens++;
  const zone = document.getElementById('tokens-zone');
  if (tokens === 1) zone.innerHTML = '';
  const star = makeStar(tokens);
  star.onclick = () => removeToken(star);
  zone.appendChild(star);
}

function removeToken(el) {
  if (answered) return;
  el.remove(); tokens--;
  document.querySelectorAll('.star-token .star-num').forEach((n,i) => n.textContent = i+1);
  if (!tokens) document.getElementById('tokens-zone').innerHTML = '<span style="color:#bbb;font-size:14px">Place tes étoiles ici !</span>';
}

function colorTokens(result) {
  const fill = result === 'correct' ? '#C0DD97' : '#F0997B';
  const stroke = result === 'correct' ? '#639922' : '#D85A30';
  const col = result === 'correct' ? '#173404' : '#4A1B0C';
  document.querySelectorAll('.star-poly').forEach(p => { p.setAttribute('fill', fill); p.setAttribute('stroke', stroke); });
  document.querySelectorAll('.star-num').forEach(n => n.style.color = col);
}

function toggleFilter(el) {
  const type = el.dataset.type, val = el.dataset.val;
  if (type === 'theme') {
    if (activeThemes.has(val)) { activeThemes.delete(val); el.classList.remove('theme-active'); }
    else { activeThemes.add(val); el.classList.add('theme-active'); }
  } else {
    if (activeSounds.has(val)) { activeSounds.delete(val); el.classList.remove('sound-active'); }
    else { activeSounds.add(val); el.classList.add('sound-active'); }
  }
  rebuildPlaylist();
}

function rebuildPlaylist() {
  let filtered = ALL_WORDS.filter(w => activeThemes.has(w.theme));
  if (activeSounds.size > 0) filtered = filtered.filter(w => [...activeSounds].some(s => w.sounds.includes(s)));
  playlist = filtered.sort(() => Math.random() - 0.5);
  idx = 0; tokens = 0; answered = false;
  const empty = document.getElementById('empty-msg');
  const area = document.getElementById('game-area');
  if (!playlist.length) { empty.style.display = 'block'; area.style.display = 'none'; }
  else { empty.style.display = 'none'; area.style.display = 'block'; render(); }
}

function current() { return playlist[idx]; }

function highlightWord(word, sounds) {
  if (!sounds || !sounds.length) return word;
  const p = [];
  if (sounds.includes('CH')) p.push('CH');
  if (sounds.includes('S')) p.push('S');
  if (sounds.includes('C')) p.push('C');
  if (sounds.includes('Z')) p.push('Z');
  if (sounds.includes('G')) p.push('G');
  if (sounds.includes('J')) p.push('J');
  return word.replace(new RegExp('(' + p.join('|') + ')', 'gi'), '<span class="hs">$1</span>');
}

function render() {
  const w = current(); if (!w) return;
  document.getElementById('word-display').innerHTML = w.emoji + ' ' + highlightWord(w.word, w.sounds);
  document.getElementById('tokens-zone').innerHTML = '<span style="color:#bbb;font-size:14px">Place tes étoiles ici !</span>';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('hint').textContent = 'Place une étoile pour chaque syllabe, puis valide !';
  document.getElementById('counter').textContent = 'Mot ' + (idx+1) + ' / ' + playlist.length;
  document.getElementById('progress').style.width = ((idx+1)/playlist.length*100) + '%';
  tokens = 0; answered = false;
}

function validate() {
  if (answered || !tokens) return;
  answered = true;
  const correct = current().syllables.length;
  const fb = document.getElementById('feedback');
  if (tokens === correct) {
    const msg = pickCorrect();
    fb.textContent = msg;
    fb.className = 'feedback correct';
    colorTokens('correct');
    speakText(msg);
  } else {
    const prefix = pickWrong();
    const syllCount = correct + (correct > 1 ? ' syllabes' : ' syllabe');
    fb.textContent = prefix + ' ' + syllCount + ' !';
    fb.className = 'feedback wrong';
    colorTokens('wrong');
    speakText(prefix + ' ' + syllCount);
  }
  document.getElementById('hint').textContent = current().syllables.join(' · ');
  const nb = document.getElementById('next-btn');
  nb.textContent = (idx+1 < playlist.length) ? 'Suivant →' : 'Rejouer 🔄';
  nb.style.display = 'block';
}

function nextWord() {
  idx++;
  if (idx >= playlist.length) { idx = 0; playlist.sort(() => Math.random() - 0.5); }
  render();
}

if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) {
  window.speechSynthesis.onvoiceschanged = () => { girlVoice = pickGirlVoice(); };
}
setTimeout(() => { girlVoice = pickGirlVoice(); }, 400);
rebuildPlaylist();
